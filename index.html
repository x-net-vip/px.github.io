<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dowalet - 跨境支付钱包</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            Wallet, ArrowRightLeft, Download, Upload, History, 
            User, Bell, Menu, X, ChevronRight, Globe, Shield,
            TrendingUp, DollarSign, CreditCard, Building2
        } = lucide;

        // Mock Data
        const mockUser = {
            name: "张经理",
            company: "深圳跨境电商科技有限公司",
            email: "finance@example.com",
            level: "T2",
            verified: true
        };

        const mockWallets = [
            { currency: "USD", balance: 125000.50, frozen: 5000, symbol: "$", name: "美元" },
            { currency: "EUR", balance: 85000.75, frozen: 2000, symbol: "€", name: "欧元" },
            { currency: "GBP", balance: 45000.25, frozen: 1000, symbol: "£", name: "英镑" },
            { currency: "JPY", balance: 2500000, frozen: 50000, symbol: "¥", name: "日元" },
            { currency: "CNY", balance: 680000, frozen: 0, symbol: "¥", name: "人民币" }
        ];

        const mockVAAccounts = [
            { id: "VA001", currency: "USD", accountNumber: "1234567890", bank: "Community Federal Savings Bank", status: "active", country: "US" },
            { id: "VA002", currency: "EUR", accountNumber: "DE89370400440532013000", bank: "Deutsche Bank", status: "active", country: "DE" },
            { id: "VA003", currency: "GBP", accountNumber: "GB29NWBK60161331926819", bank: "Barclays", status: "active", country: "GB" }
        ];

        const mockTransactions = [
            { id: "TX001", type: "收款", amount: 25000, currency: "USD", status: "成功", date: "2024-03-01", counterparty: "Amazon US" },
            { id: "TX002", type: "付款", amount: -15000, currency: "USD", status: "处理中", date: "2024-03-01", counterparty: "供应商A" },
            { id: "TX003", type: "换汇", amount: -10000, currency: "USD", status: "成功", date: "2024-02-29", counterparty: "换汇至EUR" },
            { id: "TX004", type: "收款", amount: 18000, currency: "EUR", status: "成功", date: "2024-02-28", counterparty: "eBay DE" },
            { id: "TX005", type: "提现", amount: -50000, currency: "CNY", status: "成功", date: "2024-02-27", counterparty: "中国银行" }
        ];

        const mockExchangeRates = [
            { pair: "USD/CNY", rate: 7.1985, change: 0.15 },
            { pair: "EUR/USD", rate: 1.0845, change: -0.08 },
            { pair: "GBP/USD", rate: 1.2650, change: 0.12 },
            { pair: "USD/JPY", rate: 150.25, change: -0.25 }
        ];

        // Components
        function Sidebar({ activeTab, setActiveTab, isOpen, setIsOpen }) {
            const menuItems = [
                { id: "dashboard", label: "仪表盘", icon: Wallet },
                { id: "wallet", label: "多币种钱包", icon: DollarSign },
                { id: "receive", label: "全球收款", icon: Download },
                { id: "pay", label: "付款/提现", icon: Upload },
                { id: "exchange", label: "智能换汇", icon: ArrowRightLeft },
                { id: "history", label: "交易记录", icon: History }
            ];

            return (
                <>
                    <div className={`fixed inset-0 bg-black/50 z-40 lg:hidden ${isOpen ? "block" : "hidden"}`} onClick={() => setIsOpen(false)} />
                    <aside className={`fixed left-0 top-0 h-full w-64 bg-white shadow-xl z-50 transform transition-transform lg:translate-x-0 ${isOpen ? "translate-x-0" : "-translate-x-full"}`}>
                        <div className="p-6">
                            <div className="flex items-center gap-3 mb-8">
                                <div className="w-10 h-10 gradient-bg rounded-xl flex items-center justify-center">
                                    <span className="text-white font-bold text-lg">D</span>
                                </div>
                                <div>
                                    <h1 className="font-bold text-xl gradient-text">Dowalet</h1>
                                    <p className="text-xs text-gray-500">跨境支付钱包</p>
                                </div>
                            </div>

                            <nav className="space-y-2">
                                {menuItems.map(item => {
                                    const Icon = item.icon;
                                    return (
                                        <button
                                            key={item.id}
                                            onClick={() => { setActiveTab(item.id); setIsOpen(false); }}
                                            className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${
                                                activeTab === item.id 
                                                    ? "bg-indigo-50 text-indigo-600 font-medium" 
                                                    : "text-gray-600 hover:bg-gray-50"
                                            }`}
                                        >
                                            <Icon size={20} />
                                            <span>{item.label}</span>
                                        </button>
                                    );
                                })}
                            </nav>
                        </div>

                        <div className="absolute bottom-0 left-0 right-0 p-6 border-t">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center">
                                    <User size={20} className="text-gray-600" />
                                </div>
                                <div className="flex-1">
                                    <p className="font-medium text-sm">{mockUser.name}</p>
                                    <p className="text-xs text-gray-500">{mockUser.level} 级别</p>
                                </div>
                                <div className={`w-2 h-2 rounded-full ${mockUser.verified ? "bg-green-500" : "bg-yellow-500"}`} />
                            </div>
                        </div>
                    </aside>
                </>
            );
        }

        function Dashboard({ setActiveTab }) {
            const totalBalance = mockWallets.reduce((sum, w) => sum + w.balance, 0);
            const todayIncome = mockTransactions.filter(t => t.type === "收款" && t.date === "2024-03-01").reduce((sum, t) => sum + t.amount, 0);
            const todayOutcome = mockTransactions.filter(t => ["付款", "提现"].includes(t.type) && t.date === "2024-03-01").reduce((sum, t) => sum + Math.abs(t.amount), 0);

            return (
                <div className="space-y-6">
                    <div className="gradient-bg rounded-2xl p-8 text-white">
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <p className="text-white/70 mb-2">总资产估值 (CNY)</p>
                                <h2 className="text-4xl font-bold">¥ {(totalBalance * 7.2).toLocaleString()}</h2>
                            </div>
                            <div className="flex gap-2">
                                <span className="px-3 py-1 bg-white/20 rounded-full text-sm">{mockUser.company}</span>
                                <span className="px-3 py-1 bg-green-500/80 rounded-full text-sm">已认证</span>
                            </div>
                        </div>
                        <div className="grid grid-cols-3 gap-4 mt-6">
                            <div className="bg-white/10 rounded-xl p-4">
                                <p className="text-white/70 text-sm">今日收款</p>
                                <p className="text-2xl font-semibold mt-1">${todayIncome.toLocaleString()}</p>
                            </div>
                            <div className="bg-white/10 rounded-xl p-4">
                                <p className="text-white/70 text-sm">今日付款</p>
                                <p className="text-2xl font-semibold mt-1">${todayOutcome.toLocaleString()}</p>
                            </div>
                            <div className="bg-white/10 rounded-xl p-4">
                                <p className="text-white/70 text-sm">持有币种</p>
                                <p className="text-2xl font-semibold mt-1">{mockWallets.length} 种</p>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        {[
                            { label: "收款", icon: Download, color: "bg-green-500", action: () => setActiveTab("receive") },
                            { label: "付款", icon: Upload, color: "bg-blue-500", action: () => setActiveTab("pay") },
                            { label: "换汇", icon: ArrowRightLeft, color: "bg-purple-500", action: () => setActiveTab("exchange") },
                            { label: "VA开户", icon: Building2, color: "bg-orange-500", action: () => setActiveTab("receive") }
                        ].map((item, idx) => {
                            const Icon = item.icon;
                            return (
                                <button key={idx} onClick={item.action} className="bg-white rounded-xl p-6 shadow-sm card-hover text-center">
                                    <div className={`w-12 h-12 ${item.color} rounded-xl flex items-center justify-center mx-auto mb-3`}>
                                        <Icon className="text-white" size={24} />
                                    </div>
                                    <span className="font-medium text-gray-700">{item.label}</span>
                                </button>
                            );
                        })}
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm p-6">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-semibold text-lg">最近交易</h3>
                            <button onClick={() => setActiveTab("history")} className="text-indigo-600 text-sm flex items-center gap-1">
                                查看全部 <ChevronRight size={16} />
                            </button>
                        </div>
                        <div className="space-y-3">
                            {mockTransactions.slice(0, 5).map(tx => (
                                <div key={tx.id} className="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                                    <div className="flex items-center gap-4">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center ${
                                            tx.type === "收款" ? "bg-green-100 text-green-600" :
                                            tx.type === "付款" ? "bg-red-100 text-red-600" :
                                            "bg-blue-100 text-blue-600"
                                        }`}>
                                            {tx.type === "收款" ? <Download size={20} /> :
                                             tx.type === "付款" ? <Upload size={20} /> :
                                             <ArrowRightLeft size={20} />}
                                        </div>
                                        <div>
                                            <p className="font-medium">{tx.type} - {tx.counterparty}</p>
                                            <p className="text-sm text-gray-500">{tx.date}</p>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <p className={`font-semibold ${tx.amount > 0 ? "text-green-600" : "text-gray-900"}`}>
                                            {tx.amount > 0 ? "+" : ""}{tx.amount.toLocaleString()} {tx.currency}
                                        </p>
                                        <span className={`text-xs px-2 py-1 rounded-full ${
                                            tx.status === "成功" ? "bg-green-100 text-green-600" :
                                            tx.status === "处理中" ? "bg-yellow-100 text-yellow-600" :
                                            "bg-gray-100 text-gray-600"
                                        }`}>{tx.status}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function Wallet() {
            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold">多币种钱包</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {mockWallets.map(wallet => (
                            <div key={wallet.currency} className="bg-white rounded-2xl p-6 shadow-sm card-hover">
                                <div className="flex justify-between items-start mb-4">
                                    <div className="flex items-center gap-3">
                                        <div className="w-12 h-12 bg-indigo-100 rounded-xl flex items-center justify-center text-2xl font-bold text-indigo-600">
                                            {wallet.currency}
                                        </div>
                                        <div>
                                            <p className="font-semibold">{wallet.name}</p>
                                            <p className="text-sm text-gray-500">{wallet.currency}</p>
                                        </div>
                                    </div>
                                    <span className="text-2xl">{wallet.symbol}</span>
                                </div>
                                <div className="space-y-2">
                                    <div className="flex justify-between text-sm">
                                        <span className="text-gray-500">可用余额</span>
                                        <span className="font-semibold">{wallet.symbol}{(wallet.balance - wallet.frozen).toLocaleString()}</span>
                                    </div>
                                    <div className="flex justify-between text-sm">
                                        <span className="text-gray-500">冻结金额</span>
                                        <span className="text-orange-500">{wallet.symbol}{wallet.frozen.toLocaleString()}</span>
                                    </div>
                                    <div className="pt-2 border-t">
                                        <div className="flex justify-between">
                                            <span className="text-gray-500">总资产</span>
                                            <span className="font-bold text-lg">{wallet.symbol}{wallet.balance.toLocaleString()}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                        <button className="border-2 border-dashed border-gray-300 rounded-2xl p-6 flex flex-col items-center justify-center text-gray-500 hover:border-indigo-500 hover:text-indigo-500 transition-colors min-h-[200px]">
                            <div className="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center mb-2">
                                <span className="text-2xl">+</span>
                            </div>
                            <span>申请新币种账户</span>
                        </button>
                    </div>
                </div>
            );
        }

        function Receive() {
            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold">全球收款</h2>
                        <button className="bg-indigo-600 text-white px-4 py-2 rounded-xl flex items-center gap-2 hover:bg-indigo-700">
                            <Building2 size={20} />
                            申请VA账户
                        </button>
                    </div>

                    <div className="grid gap-4">
                        {mockVAAccounts.map(va => (
                            <div key={va.id} className="bg-white rounded-2xl p-6 shadow-sm">
                                <div className="flex justify-between items-start mb-4">
                                    <div className="flex items-center gap-4">
                                        <div className="w-16 h-10 bg-gray-100 rounded flex items-center justify-center font-bold text-gray-700">
                                            {va.currency}
                                        </div>
                                        <div>
                                            <p className="font-semibold text-lg">{va.bank}</p>
                                            <p className="text-sm text-gray-500">{va.country === "US" ? "美国" : va.country === "DE" ? "德国" : "英国"}</p>
                                        </div>
                                    </div>
                                    <span className="px-3 py-1 bg-green-100 text-green-600 rounded-full text-sm font-medium">{va.status === "active" ? "已激活" : va.status}</span>
                                </div>
                                <div className="bg-gray-50 rounded-xl p-4">
                                    <p className="text-sm text-gray-500 mb-1">账户号码</p>
                                    <div className="flex justify-between items-center">
                                        <p className="font-mono text-lg font-semibold">{va.accountNumber}</p>
                                        <button className="text-indigo-600 text-sm font-medium">复制</button>
                                    </div>
                                </div>
                                <div className="flex gap-3 mt-4">
                                    <button className="flex-1 bg-indigo-50 text-indigo-600 py-2 rounded-xl font-medium hover:bg-indigo-100">创建收款单</button>
                                    <button className="flex-1 bg-gray-50 text-gray-600 py-2 rounded-xl font-medium hover:bg-gray-100">查看流水</button>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl p-6 text-white">
                        <div className="flex items-center gap-4 mb-4">
                            <Globe size={32} />
                            <div>
                                <h3 className="font-semibold text-lg">需要更多地区的收款账户？</h3>
                                <p className="text-white/80">我们支持开通美国、欧洲、英国、日本、香港等地区的本地银行账户</p>
                            </div>
                        </div>
                        <button className="bg-white text-indigo-600 px-6 py-2 rounded-xl font-medium hover:bg-white/90">立即申请</button>
                    </div>
                </div>
            );
        }

        function Pay() {
            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold">付款/提现</h2>
                        <button className="bg-indigo-600 text-white px-4 py-2 rounded-xl flex items-center gap-2 hover:bg-indigo-700">
                            <Upload size={20} />
                            发起付款
                        </button>
                    </div>

                    <div className="grid md:grid-cols-2 gap-6">
                        <div className="bg-white rounded-2xl p-6 shadow-sm">
                            <h3 className="font-semibold mb-4 flex items-center gap-2">
                                <CreditCard size={20} className="text-indigo-600" />
                                提现至国内银行卡
                            </h3>
                            <div className="space-y-3">
                                <div className="p-4 border rounded-xl flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center text-red-600 font-bold">中</div>
                                        <div>
                                            <p className="font-medium">中国银行 ****6688</p>
                                            <p className="text-sm text-gray-500">张三</p>
                                        </div>
                                    </div>
                                    <span className="text-green-600 text-sm">已验证</span>
                                </div>
                                <button className="w-full py-3 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 hover:border-indigo-500 hover:text-indigo-500">
                                    + 添加银行卡
                                </button>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl p-6 shadow-sm">
                            <h3 className="font-semibold mb-4 flex items-center gap-2">
                                <Building2 size={20} className="text-indigo-600" />
                                付款给海外供应商
                            </h3>
                            <div className="space-y-3">
                                <div className="p-4 border rounded-xl">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <p className="font-medium">ABC Trading Ltd</p>
                                            <p className="text-sm text-gray-500">美国 · 美元账户</p>
                                        </div>
                                        <span className="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded">常用</span>
                                    </div>
                                </div>
                                <div className="p-4 border rounded-xl">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <p className="font-medium">XYZ GmbH</p>
                                            <p className="text-sm text-gray-500">德国 · 欧元账户</p>
                                        </div>
                                    </div>
                                </div>
                                <button className="w-full py-3 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 hover:border-indigo-500 hover:text-indigo-500">
                                    + 添加收款人
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function Exchange() {
            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold">智能换汇</h2>

                    <div className="bg-white rounded-2xl p-6 shadow-sm">
                        <h3 className="font-semibold mb-4 flex items-center gap-2">
                            <TrendingUp size={20} className="text-indigo-600" />
                            实时汇率
                        </h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            {mockExchangeRates.map(rate => (
                                <div key={rate.pair} className="bg-gray-50 rounded-xl p-4">
                                    <p className="text-sm text-gray-500 mb-1">{rate.pair}</p>
                                    <p className="text-xl font-bold">{rate.rate.toFixed(4)}</p>
                                    <p className={`text-sm ${rate.change >= 0 ? "text-green-600" : "text-red-600"}`}>
                                        {rate.change >= 0 ? "↑" : "↓"} {Math.abs(rate.change)}%
                                    </p>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl p-6 shadow-sm">
                        <div className="flex gap-4 mb-6">
                            <button className="flex-1 py-2 bg-indigo-600 text-white rounded-xl font-medium">实时换汇</button>
                            <button className="flex-1 py-2 bg-gray-100 text-gray-600 rounded-xl font-medium">委托换汇</button>
                            <button className="flex-1 py-2 bg-gray-100 text-gray-600 rounded-xl font-medium">预约换汇</button>
                        </div>

                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm text-gray-600 mb-2">卖出币种</label>
                                <div className="flex gap-4">
                                    <select className="flex-1 p-4 border rounded-xl bg-gray-50">
                                        <option>USD - 美元 (余额: $120,000)</option>
                                        <option>EUR - 欧元 (余额: €83,000)</option>
                                        <option>GBP - 英镑 (余额: £44,000)</option>
                                    </select>
                                    <input type="number" placeholder="输入金额" className="flex-1 p-4 border rounded-xl" />
                                </div>
                            </div>

                            <div className="flex justify-center">
                                <div className="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center">
                                    <ArrowRightLeft size={20} className="text-indigo-600" />
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm text-gray-600 mb-2">买入币种</label>
                                <div className="flex gap-4">
                                    <select className="flex-1 p-4 border rounded-xl bg-gray-50">
                                        <option>CNY - 人民币</option>
                                        <option>USD - 美元</option>
                                        <option>EUR - 欧元</option>
                                    </select>
                                    <input type="text" placeholder="预计到账" className="flex-1 p-4 border rounded-xl bg-gray-100" readOnly />
                                </div>
                            </div>

                            <div className="bg-gray-50 rounded-xl p-4 space-y-2">
                                <div className="flex justify-between text-sm">
                                    <span className="text-gray-500">参考汇率</span>
                                    <span>1 USD = 7.1985 CNY</span>
                                </div>
                                <div className="flex justify-between text-sm">
                                    <span className="text-gray-500">手续费</span>
                                    <span>0.5%</span>
                                </div>
                                <div className="flex justify-between font-semibold pt-2 border-t">
                                    <span>预计到账</span>
                                    <span className="text-indigo-600">¥ 718,500.00</span>
                                </div>
                            </div>

                            <button className="w-full py-4 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700">
                                确认换汇
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function History() {
            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold">交易记录</h2>
                        <div className="flex gap-2">
                            <select className="px-4 py-2 border rounded-xl">
                                <option>全部类型</option>
                                <option>收款</option>
                                <option>付款</option>
                                <option>换汇</option>
                            </select>
                            <select className="px-4 py-2 border rounded-xl">
                                <option>全部币种</option>
                                <option>USD</option>
                                <option>EUR</option>
                                <option>CNY</option>
                            </select>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-6 py-4 text-left text-sm font-medium text-gray-500">交易类型</th>
                                    <th className="px-6 py-4 text-left text-sm font-medium text-gray-500">交易对手</th>
                                    <th className="px-6 py-4 text-left text-sm font-medium text-gray-500">金额</th>
                                    <th className="px-6 py-4 text-left text-sm font-medium text-gray-500">日期</th>
                                    <th className="px-6 py-4 text-left text-sm font-medium text-gray-500">状态</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y">
                                {mockTransactions.map(tx => (
                                    <tr key={tx.id} className="hover:bg-gray-50">
                                        <td className="px-6 py-4">
                                            <span className={`inline-flex items-center gap-2 px-3 py-1 rounded-full text-sm ${
                                                tx.type === "收款" ? "bg-green-100 text-green-600" :
                                                tx.type === "付款" ? "bg-red-100 text-red-600" :
                                                tx.type === "提现" ? "bg-orange-100 text-orange-600" :
                                                "bg-blue-100 text-blue-600"
                                            }`}>
                                                {tx.type}
                                            </span>
                                        </td>
                                        <td className="px-6 py-4">{tx.counterparty}</td>
                                        <td className={`px-6 py-4 font-semibold ${tx.amount > 0 ? "text-green-600" : ""}`}>
                                            {tx.amount > 0 ? "+" : ""}{tx.amount.toLocaleString()} {tx.currency}
                                        </td>
                                        <td className="px-6 py-4 text-gray-500">{tx.date}</td>
                                        <td className="px-6 py-4">
                                            <span className={`px-2 py-1 rounded-full text-xs ${
                                                tx.status === "成功" ? "bg-green-100 text-green-600" :
                                                tx.status === "处理中" ? "bg-yellow-100 text-yellow-600" :
                                                "bg-gray-100 text-gray-600"
                                            }`}>{tx.status}</span>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState("dashboard");
            const [sidebarOpen, setSidebarOpen] = useState(false);

            const renderContent = () => {
                switch(activeTab) {
                    case "dashboard": return <Dashboard setActiveTab={setActiveTab} />;
                    case "wallet": return <Wallet />;
                    case "receive": return <Receive />;
                    case "pay": return <Pay />;
                    case "exchange": return <Exchange />;
                    case "history": return <History />;
                    default: return <Dashboard setActiveTab={setActiveTab} />;
                }
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} isOpen={sidebarOpen} setIsOpen={setSidebarOpen} />
                    
                    <div className="lg:ml-64">
                        <header className="bg-white shadow-sm sticky top-0 z-30">
                            <div className="flex justify-between items-center px-6 py-4">
                                <button onClick={() => setSidebarOpen(true)} className="lg:hidden p-2 hover:bg-gray-100 rounded-lg">
                                    <Menu size={24} />
                                </button>
                                
                                <div className="flex items-center gap-4 ml-auto">
                                    <button className="p-2 hover:bg-gray-100 rounded-lg relative">
                                        <Bell size={20} className="text-gray-600" />
                                        <span className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                                    </button>
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center">
                                            <User size={20} className="text-indigo-600" />
                                        </div>
                                        <div className="hidden md:block">
                                            <p className="font-medium text-sm">{mockUser.name}</p>
                                            <p className="text-xs text-gray-500">{mockUser.company}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </header>

                        <main className="p-6 max-w-7xl mx-auto">
                            {renderContent()}
                        </main>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
